<div class="update-page">
  <div class="update-container">
    <div class="header">
      <h2>Update Student</h2>
      <button type="button" class="back-btn" (click)="goToStudentList()">← Back</button>
    </div>

    <!-- ✅ FORM WITH VALIDATION -->
    <form #studentForm="ngForm" (ngSubmit)="onSubmit(studentForm)" class="student-form">

      <!-- First & Last Name -->
      <div class="row">
        <div class="form-group">
          <label>First Name</label>
          <input type="text"
                 [(ngModel)]="student.firstName"
                 name="firstName"
                 #firstName="ngModel"
                 required
                 pattern="^[A-Za-z\s]+$" />

          <div *ngIf="firstName.invalid && firstName.touched" class="text-red-500">
            First Name must contain only letters!
          </div>
        </div>

        <div class="form-group">
          <label>Last Name</label>
          <input type="text"
                 [(ngModel)]="student.lastName"
                 name="lastName"
                 #lastName="ngModel"
                 required
                 pattern="^[A-Za-z\s]+$" />

          <div *ngIf="lastName.invalid && lastName.touched" class="text-red-500">
            Last Name must contain only letters!
          </div>
        </div>
      </div>

      <!-- Age & Gender -->
      <div class="row">
        <div class="form-group">
          <label>Age</label>
          <input type="number"
                 [(ngModel)]="student.age"
                 name="age"
                 #age="ngModel"
                 required />
                 <div *ngIf="age.invalid && age.touched" class="text-red-500">
            Age is required!
          </div>
        </div>

        <div class="form-group">
          <label>Gender</label>
          <select [(ngModel)]="student.gender"
                  name="gender"
                  #gender="ngModel"
                  required>
            <option value="">Select Gender</option>
            <option value="Male">Male</option>
            <option value="Female">Female</option>
            <option value="Other">Other</option>
          </select>
          <div *ngIf="gender.invalid && gender.touched" class="text-red-500">
            Gender is required!
          </div>
        </div>
      </div>

      <!-- Email & Phone -->
      <div class="row">
        <div class="form-group">
          <label>Email</label>
          <input type="email"
                 [(ngModel)]="student.email"
                 name="email"
                 #email="ngModel"
                 required
                 pattern="^[a-zA-Z0-9._%+-]+@[a-zA-Z0-9.-]+\.[a-z]{2,}$" />

          <div *ngIf="email.invalid && email.touched" class="text-red-500">
            Enter valid email ID!
          </div>
        </div>

        <div class="form-group">
          <label>Phone Number</label>
          <input type="text"
                 [(ngModel)]="student.phoneNumber"
                 name="phoneNumber"
                 #phone="ngModel"
                 required
                 pattern="[0-9]{10}" />

          <div *ngIf="phone.invalid && phone.touched" class="text-red-500">
            Enter valid 10-digit phone number!
          </div>
        </div>
      </div>

      <!-- City & Course -->
      <div class="row">
        <div class="form-group">
          <label>City</label>
          <input type="text"
                 [(ngModel)]="student.city"
                 name="city"
                 #city="ngModel"
                 required
                 pattern="^[A-Za-z\s]+$" />

          <div *ngIf="city.invalid && city.touched" class="text-red-500">
            City must contain only letters!
          </div>
        </div>

        <div class="form-group">
          <label>Course</label>
          <input type="text"
                 [(ngModel)]="student.course"
                 name="course"
                 #course="ngModel"
                 required />
        </div>
      </div>

      <!-- Submit -->
      <div class="form-row-full">
        <button type="submit"
                class="submit-btn"
                >
          Update Student
        </button>
      </div>

    </form>
  </div>
</div>
